
<style>
  .ctrl-bar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; align-items:center; }
  .ctrl-btn { padding:5px 12px; font-size:12px; border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); background:var(--color-background-primary); color:var(--color-text-primary); cursor:pointer; transition:background .15s; }
  .ctrl-btn.active { background:var(--color-text-primary); color:var(--color-background-primary); }
  .ctrl-btn:hover:not(.active) { background:var(--color-background-secondary); }
  .legend { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; font-size:11px; color:var(--color-text-secondary); align-items:center; }
  .legend-swatch { width:12px; height:12px; border-radius:2px; display:inline-block; }
  .tooltip { position:absolute; background:var(--color-background-primary); border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); padding:8px 12px; font-size:12px; pointer-events:none; display:none; z-index:10; min-width:160px; color:var(--color-text-primary); }
  .tt-country { font-size:13px; font-weight:500; margin-bottom:4px; }
  .tt-row { display:flex; justify-content:space-between; gap:16px; color:var(--color-text-secondary); }
  .tt-val { color:var(--color-text-primary); font-weight:500; }
  #map-wrap { position:relative; width:100%; }
  svg text { font-family: var(--font-sans); }
</style>

<h2 class="sr-only">Interactive map of crime statistics for Germany, France, Italy, Greece, Norway, Lithuania, and Romania (2008–2023)</h2>

<div class="ctrl-bar">
  <span style="font-size:11px;color:var(--color-text-secondary);margin-right:4px;">Crime</span>
  <button class="ctrl-btn active" onclick="setCategory('Homicide',this)">Homicide</button>
  <button class="ctrl-btn" onclick="setCategory('Sexual Assault',this)">Sexual assault</button>
  <button class="ctrl-btn" onclick="setCategory('Theft',this)">Theft</button>
  <span style="font-size:11px;color:var(--color-text-secondary);margin-left:8px;margin-right:4px;">Measure</span>
  <button class="ctrl-btn active" id="btn-raw" onclick="setMeasure('raw',this)">Raw count</button>
  <button class="ctrl-btn" id="btn-rate" onclick="setMeasure('rate',this)">Rate per 100k</button>
  <span style="font-size:11px;color:var(--color-text-secondary);margin-left:8px;margin-right:4px;">Map type</span>
  <button class="ctrl-btn active" id="btn-choro" onclick="setMapType('choropleth',this)">Choropleth</button>
  <button class="ctrl-btn" id="btn-bubble" onclick="setMapType('bubble',this)">Bubble</button>
</div>

<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px;">
  Year: <strong id="yr-label">2023</strong>
  <input type="range" min="0" max="15" value="15" step="1" id="yr-slider" style="width:180px;margin-left:8px;vertical-align:middle;">
</div>

<div id="map-wrap">
  <div class="tooltip" id="tooltip"></div>
  <svg id="map-svg" viewBox="0 0 680 420" width="100%" style="display:block;"></svg>
</div>

<div class="legend" id="legend"></div>

      Romania:  [1213.63,1158.01,1092.99,1040.65,985.33,934.21,884.56,844.77,806.33,765.43,733.47,704.19,636.71,622.05,673.72,709.54],
    }

};

const COUNTRY_COORDS = {
  Germany:   [10.4, 51.2],
  France:    [2.3,  46.2],
  Italy:     [12.6, 42.5],
  Greece:    [22.0, 39.0],
  Norway:    [10.8, 64.5],
  Lithuania: [23.9, 55.9],
  Romania:   [25.0, 45.9],
};

const ISO_IDS = {
  Germany:   276,
  France:    250,
  Italy:     380,
  Greece:    300,
  Norway:    578,
  Lithuania: 440,
  Romania:   642,
};

const COUNTRY_NAMES = Object.keys(COUNTRY_COORDS);

let category = 'Homicide';
let measure = 'raw';
let mapType = 'choropleth';
let yearIdx = 15;
let worldData = null;

const svg = d3.select('#map-svg');
const width = 680, height = 420;
const projection = d3.geoNaturalEarth1()
  .scale(900)
  .center([15, 54])
  .translate([width/2, height/2]);
const path = d3.geoPath(projection);
const tooltip = document.getElementById('tooltip');
const mapWrap = document.getElementById('map-wrap');

function getValue(country) {
  const arr = DATA[category][measure][country];
  return arr ? arr[yearIdx] : 0;
}

function getAllValues() {
  return COUNTRY_NAMES.map(c => getValue(c));
}

const choroColors = ['#E6F1FB','#B5D4F4','#85B7EB','#378ADD','#185FA5','#0C447C'];
const darkChoroColors = ['#042C53','#0C447C','#185FA5','#378ADD','#85B7EB','#B5D4F4'];

function getColorScale() {
  const vals = getAllValues();
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const colors = isDark ? darkChoroColors : choroColors;
  return d3.scaleQuantile().domain(vals).range(colors);
}

function formatVal(v) {
  if (measure === 'rate') return v.toFixed(2);
  return v.toLocaleString();
}

function showTooltip(event, country) {
  const v = getValue(country);
  const unit = measure === 'rate' ? ' per 100k' : ' offences';
  tooltip.innerHTML = `
    <div class="tt-country">${country}</div>
    <div class="tt-row"><span>${category}</span><span class="tt-val">${formatVal(v)}${unit}</span></div>
    <div class="tt-row"><span>Year</span><span class="tt-val">${YEARS[yearIdx]}</span></div>
  `;
  tooltip.style.display = 'block';
  moveTooltip(event);
}

function moveTooltip(event) {
  const rect = mapWrap.getBoundingClientRect();
  const svgEl = document.getElementById('map-svg');
  const svgRect = svgEl.getBoundingClientRect();
  let x = event.clientX - svgRect.left + 12;
  let y = event.clientY - svgRect.top + 12;
  if (x + 180 > svgRect.width) x = x - 200;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() { tooltip.style.display = 'none'; }

function updateLegend() {
  const leg = document.getElementById('legend');
  if (mapType === 'bubble') {
    leg.innerHTML = '<span>Bubble size = ' + (measure==='raw'?'raw count':'rate per 100k') + '</span>';
    return;
  }
  const colorScale = getColorScale();
  const vals = getAllValues().sort(d3.ascending);
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const colors = isDark ? darkChoroColors : choroColors;
  const quants = colorScale.quantiles();
  let html = '<span style="margin-right:4px;">Low</span>';
  colors.forEach((c,i) => {
    html += `<span class="legend-swatch" style="background:${c}"></span>`;
  });
  html += '<span style="margin-left:4px;">High</span>';
  html += `<span style="margin-left:12px;">${measure==='raw'?'Raw count':'Rate per 100k'}</span>`;
  leg.innerHTML = html;
}

function drawMap() {
  if (!worldData) return;
  svg.selectAll('*').remove();

  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const colorScale = getColorScale();
  const bgFill = isDark ? '#1a1a2e' : '#cde7f7';
  const landFill = isDark ? '#2a2a3e' : '#e8e4dc';
  const borderColor = isDark ? 'rgba(255,255,255,0.12)' : '#fff';

  svg.append('rect').attr('width', width).attr('height', height).attr('fill', bgFill).attr('rx', 6);

  const countries = topojson.feature(worldData, worldData.objects.countries);

  svg.selectAll('.land')
    .data(countries.features)
    .join('path')
    .attr('class','land')
    .attr('d', path)
    .attr('fill', d => {
      const entry = Object.entries(ISO_IDS).find(([k,v]) => v === +d.id);
      if (!entry) return landFill;
      if (mapType === 'choropleth') return colorScale(getValue(entry[0]));
      return isDark ? '#3a3a5e' : '#d4cfc5';
    })
    .attr('stroke', d => {
      const entry = Object.entries(ISO_IDS).find(([k,v]) => v === +d.id);
      return entry ? (isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)') : borderColor;
    })
    .attr('stroke-width', d => {
      const entry = Object.entries(ISO_IDS).find(([k,v]) => v === +d.id);
      return entry ? 1 : 0.3;
    })
    .attr('cursor', d => {
      const entry = Object.entries(ISO_IDS).find(([k,v]) => v === +d.id);
      return entry ? 'pointer' : 'default';
    })
    .on('mousemove', function(event, d) {
      const entry = Object.entries(ISO_IDS).find(([k,v]) => v === +d.id);
      if (entry) { showTooltip(event, entry[0]); d3.select(this).attr('opacity', 0.75); }
    })
    .on('mouseleave', function(event, d) {
      hideTooltip();
      d3.select(this).attr('opacity', 1);
    });

  if (mapType === 'bubble') {
    const vals = getAllValues();
    const maxVal = d3.max(vals);
    const rScale = d3.scaleSqrt().domain([0, maxVal]).range([4, 36]);

    COUNTRY_NAMES.forEach(country => {
      const [lon, lat] = COUNTRY_COORDS[country];
      const [cx, cy] = projection([lon, lat]);
      const v = getValue(country);
      svg.append('circle')
        .attr('cx', cx).attr('cy', cy)
        .attr('r', rScale(v))
        .attr('fill', '#185FA5')
        .attr('fill-opacity', 0.55)
        .attr('stroke', '#0C447C')
        .attr('stroke-width', 1.5)
        .attr('cursor','pointer')
        .on('mousemove', (event) => showTooltip(event, country))
        .on('mouseleave', hideTooltip);

      svg.append('text')
        .attr('x', cx).attr('y', cy - rScale(v) - 4)
        .attr('text-anchor','middle')
        .attr('font-size', 10)
        .attr('fill', isDark ? '#cde' : '#1B4F8A')
        .attr('font-weight', 500)
        .text(country.length > 9 ? country.slice(0,3) : country);
    });
  } else {
    COUNTRY_NAMES.forEach(country => {
      const [lon, lat] = COUNTRY_COORDS[country];
      const [cx, cy] = projection([lon, lat]);
      svg.append('text')
        .attr('x', cx).attr('y', cy + 3)
        .attr('text-anchor','middle')
        .attr('font-size', 9)
        .attr('fill', isDark ? '#fff' : '#0C447C')
        .attr('font-weight', 500)
        .attr('pointer-events','none')
        .text(country.length > 9 ? country.slice(0,3) : country);
    });
  }

  svg.append('text')
    .attr('x', 8).attr('y', 18)
    .attr('font-size', 11).attr('font-weight', 500)
    .attr('fill', isDark ? '#ccc' : '#333')
    .text(category + ' — ' + (measure==='raw' ? 'Raw count' : 'Rate per 100k') + ' — ' + YEARS[yearIdx]);

  updateLegend();
}

function setCategory(cat, btn) {
  category = cat;
  document.querySelectorAll('.ctrl-bar button').forEach(b => {
    if (['Homicide','Sexual Assault','Theft'].includes(b.textContent.trim()) ||
        b.textContent.trim() === 'Sexual assault') {
      b.classList.remove('active');
    }
  });
  btn.classList.add('active');
  drawMap();
}

function setMeasure(m, btn) {
  measure = m;
  document.getElementById('btn-raw').classList.toggle('active', m==='raw');
  document.getElementById('btn-rate').classList.toggle('active', m==='rate');
  drawMap();
}

function setMapType(t, btn) {
  mapType = t;
  document.getElementById('btn-choro').classList.toggle('active', t==='choropleth');
  document.getElementById('btn-bubble').classList.toggle('active', t==='bubble');
  drawMap();
}

document.getElementById('yr-slider').addEventListener('input', function() {
  yearIdx = +this.value;
  document.getElementById('yr-label').textContent = YEARS[yearIdx];
  drawMap();
});

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(data => {
  worldData = data;
  drawMap();
});
</script>
